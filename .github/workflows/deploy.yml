name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Backend → Render.com ───────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend (Render.com)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render Deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          # Trigger a new deploy on Render
          curl -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'

  # ── Frontend → GitHub Pages ─────────────────────────────────────────────────
  deploy-frontend:
    name: Build & deploy frontend (GitHub Pages)
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Debug env
        run: echo "VITE_API_BASE_URL -> [${VITE_API_BASE_URL}]"
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Clear Vite cache
        run: rm -rf node_modules/.vite dist

      - name: Build
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Verify env var landed in build
        run: |
        if grep -rq "onrender" dist/assets/*.js; then
          echo "FOUND onrender reference in build output"
        else
          echo "MISSING onrender reference NOT in build output"
        fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true